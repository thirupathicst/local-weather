apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-backend
  labels:
    app: weather-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: weather-backend
  template:
    metadata:
      labels:
        app: weather-backend
    spec:
      containers:
        - name: weather-backend
          image: thirupathicst/weather-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
---        
apiVersion: v1
kind: Service
metadata:
  name: weather-backend-service
spec:
  type: ClusterIP
  selector:
    app: weather-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000